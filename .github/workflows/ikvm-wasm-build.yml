name: IKVM WASM Build

env:
  EMSDK_VERSION: 3.1.56
  IKVM_REF: 8.14.0
  NATIVE_SDK_VERSION: "20251124.1"
  BUILD_RUNTIME: linux-x64

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-managed:
    name: Build IKVM Managed Runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 720
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.sln', '**/*.csproj', '**/*.ikvmproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Managed Build Prereqs
        run: |
          sudo apt-get update && \
          sudo apt-get install -y mono-runtime mono-devel openjdk-8-jdk-headless clang llvm

      - name: Build managed artifacts via script
        shell: bash
        run: bash "$GITHUB_WORKSPACE/tools/ikvm/build-ikvm-local.sh" --managed-only

      - name: Upload MSBuild Log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: msbuild.binlog
          path: tools/ikvm/ikvm/msbuild.binlog
          if-no-files-found: warn

      - name: Upload Managed DLLs
        uses: actions/upload-artifact@v4
        with:
          name: managed-dlls
          path: tools/ikvm/out/managed/*.dll
          if-no-files-found: error

      - name: Package linux-x64 JRE image
        shell: bash
        run: |
          IMAGE_DIR="tools/ikvm/ikvm/src/IKVM.Image/bin/Release/net8.0/ikvm/${BUILD_RUNTIME}/"
          tar czvf /tmp/ikvm-image-${BUILD_RUNTIME}.tar.gz -C "$IMAGE_DIR" .

      - name: Upload linux-x64 JRE image
        uses: actions/upload-artifact@v4
        with:
          name: ikvm-image-linux-x64
          path: /tmp/ikvm-image-linux-x64.tar.gz
          if-no-files-found: error

  build-wasm-native:
    name: Build IKVM WASM Native (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [mt, st]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: Build WASM native artifacts via script
        shell: bash
        run: bash "$GITHUB_WORKSPACE/tools/ikvm/build-ikvm-local.sh" --native-only --native-variant="${{ matrix.variant }}" --clean-native

      - name: Upload WASM native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-native-${{ matrix.variant }}
          path: tools/ikvm/out/native/*.a
          if-no-files-found: error

  build-java-native-deps:
    name: build java/native deps (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [mt, st]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: build glfw
        shell: bash
        run: bash "$GITHUB_WORKSPACE/tools/native-deps/build-glfw.sh" --variant="${{ matrix.variant }}" --output-dir="$GITHUB_WORKSPACE/out/java-native-deps/${{ matrix.variant }}"

      - name: build lwjgl3
        shell: bash
        run: bash "$GITHUB_WORKSPACE/tools/native-deps/build-lwjgl3.sh" --variant="${{ matrix.variant }}" --output-dir="$GITHUB_WORKSPACE/out/java-native-deps/${{ matrix.variant }}"

      - name: Upload Java/native dependency artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-native-deps-${{ matrix.variant }}
          path: out/java-native-deps/${{ matrix.variant }}/*
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-managed, build-wasm-native, build-java-native-deps]
    permissions:
      contents: write
    steps:
      - name: Generate release id
        run: echo RELEASE_NAME=$(uuidgen) >> "$GITHUB_ENV"

      - name: Download managed DLLs
        uses: actions/download-artifact@v4
        with:
          name: managed-dlls
          path: managed/

      - name: Download WASM native artifacts (mt)
        uses: actions/download-artifact@v4
        with:
          name: wasm-native-mt
          path: native/

      - name: Download WASM native artifacts (st)
        uses: actions/download-artifact@v4
        with:
          name: wasm-native-st
          path: native/

      - name: Download Java/native dependency artifacts (mt)
        uses: actions/download-artifact@v4
        with:
          name: java-native-deps-mt
          path: java-native-deps/mt/

      - name: Download Java/native dependency artifacts (st)
        uses: actions/download-artifact@v4
        with:
          name: java-native-deps-st
          path: java-native-deps/st/

      - name: Download linux-x64 JRE image
        uses: actions/download-artifact@v4
        with:
          name: ikvm-image-linux-x64
          path: /tmp/image

      - name: Restore linux-x64 JRE image
        run: |
          mkdir -p image
          tar xzvf /tmp/image/ikvm-image-linux-x64.tar.gz -C image

      - name: Bundle artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release

          zip -j "release/ikvm-wasm-bundle.zip" \
            managed/IKVM.Runtime.dll \
            managed/IKVM.CoreLib.dll \
            managed/IKVM.Java.dll \
            managed/IKVM.ByteCode.dll \
            native/libjvm.a \
            native/libikvm.a \
            native/libiava.a \
            native/libjpeg.a \
            native/libsunec.a \
            native/libunpack.a \
            native/libzip.a \
            native/libmanagement.a \
            native/libnio.a \
            native/libnet.a
          zip -r "release/ikvm-wasm-bundle.zip" image

          zip -j "release/glfw-mobileglues-mt.zip" \
            java-native-deps/mt/libglfw3.a \
            java-native-deps/mt/lib_emscripten_glfw3.js

          zip -j "release/glfw-mobileglues-st.zip" \
            java-native-deps/st/libglfw3.a \
            java-native-deps/st/lib_emscripten_glfw3.js

          zip -j "release/lwjgl3-mt.zip" \
            java-native-deps/mt/lwjgl3.jar \
            java-native-deps/mt/liblwjgl3.a

          zip -j "release/lwjgl3-st.zip" \
            java-native-deps/st/lwjgl3.jar \
            java-native-deps/st/liblwjgl3.a

          mkdir -p /tmp/st-native
          cp native/ST-libjvm.a /tmp/st-native/libjvm.a
          cp native/ST-libikvm.a /tmp/st-native/libikvm.a
          cp native/ST-libiava.a /tmp/st-native/libiava.a
          cp native/ST-libjpeg.a /tmp/st-native/libjpeg.a
          cp native/ST-libsunec.a /tmp/st-native/libsunec.a
          cp native/ST-libunpack.a /tmp/st-native/libunpack.a
          cp native/ST-libzip.a /tmp/st-native/libzip.a
          cp native/ST-libmanagement.a /tmp/st-native/libmanagement.a
          cp native/ST-libnio.a /tmp/st-native/libnio.a
          cp native/ST-libnet.a /tmp/st-native/libnet.a
          zip -j "release/ikvm-wasm-ST-bundle.zip" \
            managed/IKVM.Runtime.dll \
            managed/IKVM.CoreLib.dll \
            managed/IKVM.Java.dll \
            managed/IKVM.ByteCode.dll \
            /tmp/st-native/libjvm.a \
            /tmp/st-native/libikvm.a \
            /tmp/st-native/libiava.a \
            /tmp/st-native/libjpeg.a \
            /tmp/st-native/libsunec.a \
            /tmp/st-native/libunpack.a \
            /tmp/st-native/libzip.a \
            /tmp/st-native/libmanagement.a \
            /tmp/st-native/libnio.a \
            /tmp/st-native/libnet.a
          zip -r "release/ikvm-wasm-ST-bundle.zip" image
          rm -rf /tmp/st-native

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: "IKVM WASM ${{ env.RELEASE_NAME }}"
          body: "These are the IKVM libs built for WASM (Emscripten)"
          commit: ${{ github.ref_name }}
          tag: ${{ env.RELEASE_NAME }}
          removeArtifacts: true
          artifacts: "release/*"
          token: ${{ secrets.GITHUB_TOKEN }}
